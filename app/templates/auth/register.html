{% extends "base.html" %}
{% block title %}Register — NIST University{% endblock %}

{% block public_content %}
<div class="auth-container">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <div class="auth-logo">AE</div>
            <h1>Create Account</h1>
            <p class="text-muted">Join the Automated Assignment Evaluation System</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="name@university.edu" required>
            </div>
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="student_id">Student ID (Roll No)</label>
                <input type="text" id="student_id" name="student_id" class="form-control" placeholder="e.g. 2024CS001" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Create a strong password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-2">Sign Up →</button>
        </form>

        <div class="auth-footer mt-3">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
